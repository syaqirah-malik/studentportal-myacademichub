<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>My Academic Hub - Login</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">
    <style>
        body { background-color: #f1f5f9; height: 100vh; display: flex; align-items: center; justify-content: center; }
        .login-card { max-width: 400px; width: 100%; border: none; border-radius: 12px; }
        .btn-custom { background-color: #1e3a8a; color: white; }
        .btn-custom:hover { background-color: #1e40af; color: white; }
    </style>
</head>
<body>
<div class="card login-card shadow p-4">
    <div class="text-center mb-4">
        <i class="bi bi-mortarboard-fill fs-1" style="color: #1e3a8a;"></i>
        <h2 class="fw-bold mt-2">My Academic Hub</h2>
    </div>
    <form action="dashboard.html" method="GET">
        <div class="mb-3">
            <label class="form-label font-monospace small fw-bold">STUDENT ID</label>
            <input type="text" class="form-control" value=" " required>
        </div>
        <div class="mb-4">
            <label class="form-label font-monospace small fw-bold">PASSWORD</label>
            <input type="password" class="form-control" value="password123" required>
        </div>
        <button type="submit" class="btn btn-custom w-100 py-2 fw-bold">LOG IN</button>
    </form>
</div>
</body>
</html>
